services:
  benchmark:
    build:
      context: .
      dockerfile: Dockerfile.benchmark
    image: npcsh-benchmark:latest
    container_name: npcsh-benchmark
    # host networking lets the container reach a locally running Ollama on
    # Linux.  On macOS Docker Desktop does not support host networking; use
    # NPCSH_API_URL or ollama's host.docker.internal listener instead.
    network_mode: host
    environment:
      - NPCSH_BENCHMARK_DIR=/data/npcsh
      - NPCSH_HISTORY_DB=/data/npcsh/npcsh_history.db
      - NPCSH_DB_PATH=/data/npcsh/npcsh_history.db
      - NPCSH_NPC_TEAM_DIR=/root/.npcsh/npc_team
      - NPCSH_INITIALIZED=1
      - NPCSH_ACCEPT_PERMISSIONS=1
      - OLLAMA_HOST=${OLLAMA_HOST:-http://localhost:11434}
    volumes:
      # All benchmark state (CSVs, DB, transcripts) land here.  Host ~/.npcsh
      # is intentionally NOT mounted.
      - ./results/npcsh:/data/npcsh
      - .:/opt/npcsh:ro
    working_dir: /workspace
    # Keep the container alive only while the benchmark runs.
    stdin_open: false
    tty: false
