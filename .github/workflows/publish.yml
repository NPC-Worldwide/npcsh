name: Build and publish npcsh

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-crate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Patch version and deps
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          sed -i "s/^version = \"0.0.0\"/version = \"$VERSION\"/" rust/Cargo.toml
          sed -i 's|npcrs = { path = "../../npcrs".*}|npcrs = { version = "0.1", default-features = false, features = ["ffi"] }|' rust/Cargo.toml
      - name: Publish to crates.io
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty

  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: npcsh-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: npcsh-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: npcsh-macos-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Switch to published npcrs
        run: |
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' 's|npcrs = { path = "../../npcrs".*}|npcrs = { version = "0.1", default-features = false, features = ["ffi"] }|' rust/Cargo.toml
          else
            sed -i 's|npcrs = { path = "../../npcrs".*}|npcrs = { version = "0.1", default-features = false, features = ["ffi"] }|' rust/Cargo.toml
          fi

      - name: Build npcsh
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp rust/target/${{ matrix.target }}/release/npcsh dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

      - name: Package .deb
        if: contains(matrix.target, 'linux')
        run: |
          mkdir -p deb/usr/local/bin deb/DEBIAN
          cp dist/${{ matrix.artifact }} deb/usr/local/bin/npcsh
          chmod +x deb/usr/local/bin/npcsh
          cat > deb/DEBIAN/control << 'CTRL'
          Package: npcsh
          Version: ${{ github.ref_name }}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: NPC Worldwide <info@npcworldwi.de>
          Description: The composable multi-agent shell
          CTRL
          sed -i 's/^          //' deb/DEBIAN/control
          dpkg-deb --build deb dist/npcsh_${{ github.ref_name }}_amd64.deb

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.artifact }}
            dist/*.deb
