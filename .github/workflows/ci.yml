name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
      with:
        path: npcsh

    - name: Check out npcpy dependency
      uses: actions/checkout@v4
      with:
        repository: NPC-Worldwide/npcpy
        path: npcpy

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install npcpy/

    - name: Run tests
      run: |
        export PYTHONPATH="$PWD/npcpy:$PYTHONPATH"
        pytest npcsh/tests/ -v

  rust-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Check Rust code
      working-directory: rust
      run: cargo check

  rust-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Run Rust tests
      working-directory: rust
      run: cargo test

  no-committed-binaries:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Fail if npcsh/bin contains anything other than .gitkeep
      run: |
        unexpected=$(git ls-files npcsh/bin/ | grep -v '^npcsh/bin/\.gitkeep$' || true)
        if [ -n "$unexpected" ]; then
          echo "ERROR: binary files committed under npcsh/bin/:"
          echo "$unexpected"
          echo "These must be released per-platform, not checked in."
          exit 1
        fi
