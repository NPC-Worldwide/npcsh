name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pyyaml

    - name: Run tests
      run: |
        pytest tests/ -v

  validate-jinxes:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install npcpy
      run: pip install npcpy

    - name: Validate jinx files
      run: |
        python -c "
        from npcpy.npc_compiler import load_jinxes_from_directory
        import sys

        try:
            jinxes = load_jinxes_from_directory('npcsh/npc_team/jinxes')
            print(f'Loaded {len(jinxes)} jinx files successfully')
        except Exception as e:
            print(f'Jinx validation error: {e}')
            sys.exit(1)
        "

  rust-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Check Rust code
      working-directory: rust
      run: cargo check

  no-committed-binaries:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Fail if npcsh/bin contains anything other than .gitkeep
      run: |
        unexpected=$(git ls-files npcsh/bin/ | grep -v '^npcsh/bin/\.gitkeep$' || true)
        if [ -n "$unexpected" ]; then
          echo "ERROR: binary files committed under npcsh/bin/:"
          echo "$unexpected"
          echo "These must be released per-platform, not checked in."
          exit 1
        fi
